[tasks."api:c"]
run = "rm -rf api/c/gen src/content/docs/api/c && mkdir -p api/c/gen src/content/docs/api/c && doxygen api/c/Doxyfile && pnpm exec moxygen --quiet --groups --frontmatter --html-anchors --source-root ../include --output 'src/content/docs/api/c/%s.md' api/c/gen/xml"

[tasks.dev]
depends = ["api:c"]
run = "pnpm exec astro dev"

[tasks.start]
depends = ["api:c"]
run = "pnpm exec astro dev"

[tasks.build]
depends = ["api:c"]
run = "pnpm exec astro build"

[tasks.preview]
run = "pnpm exec astro preview"

[tasks.astro]
run = "pnpm exec astro"
