[settings]
pin = true
experimental = true

[tools]
hk = "1.40.0"
pkl = "0.31.0"
dprint = "0.53.2"
"github:sargunv/jvl" = "2026.04.03"
cmake = "3.31.6"
"github:blankspruce/gersemi" = "0.27.2"
zig = "0.16.0"
java = "21.0.2"
gradle = "8.14.3"

[tools."github:llvm/llvm-project"]
version = "22.1.4"
version_prefix = "llvmorg-"
bin_path = "bin"
strip_components = 1

[hooks]
postinstall = [
  "hk install --mise",
]

[tasks.build]
description = "Build core library"
run = [
  "cmake -S . -B build",
  "cmake --build build --parallel",
]

[tasks.clean]
description = "Remove generated build outputs"
run = "rm -rf build"

[tasks.test]
description = "Run all tests"
depends = ["build"]
run = "zig build test --summary all"

[tasks."example:zig-map"]
description = "Run Zig map example"
depends = ["build"]
run = "zig build run"

[tasks."example:compose-map"]
description = "Run Compose map texture demo"
run = "gradle -p examples/compose-map run -Dskiko.renderApi=METAL"

[tasks.check]
description = "Run all checks"
run = "hk check --all"

[tasks.fix]
description = "Fix all auto-fixable issues"
run = "hk fix --all"
