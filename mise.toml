[settings]
pin = true
experimental = true

[tools]
hk = "1.40.0"
pkl = "0.31.0"
dprint = "0.53.2"
"github:sargunv/jvl" = "2026.04.03"
cmake = "3.31.6"
"github:blankspruce/gersemi" = "0.27.2"
zig = "0.16.0"

[tools."github:llvm/llvm-project"]
version = "22.1.4"
version_prefix = "llvmorg-"
bin_path = "bin"
strip_components = 1

[hooks]
postinstall = [
  "hk install --mise",
]

[tasks.build]
description = "Build core library"
run = [
  "cmake -S . -B build",
  "cmake --build build --parallel",
]

[tasks."clean:build"]
description = "Remove generated CMake build directory"
run = "rm -rf build"

[tasks.test]
description = "Run all tests"
depends = ["build"]
run = "zig build test --summary all"

[tasks."build:sdl3-map"]
description = "Build SDL3 Zig map example"
depends = ["build"]
run = "zig build"

[tasks."run:sdl3-map"]
description = "Run SDL3 Zig map example"
depends = ["build:sdl3-map"]
run = "zig build run"

[tasks.check]
description = "Run all checks"
run = "hk check --all"

[tasks.fix]
description = "Fix all auto-fixable issues"
run = "hk fix --all"
