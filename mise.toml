# https://mise.jdx.dev
# Mise is the contributor entrypoint: it pins tools, installs hooks, and runs
# repository tasks.

experimental_monorepo_root = true

[settings]
pin = true
experimental = true

[monorepo]
config_roots = ["examples/*"]

[tools]
hk = "1.40.0"
pkl = "0.31.0"
dprint = "0.53.2"
"github:sargunv/jvl" = "2026.04.29"
pixi = "0.67.2"
"github:cmakefmt/cmakefmt" = "1.3.0"
zig = "0.16.0"
"conda:doxygen" = "1.13.2"
actionlint = "1.7.8"

[hooks]
postinstall = [
  "hk install --mise",
  "pixi install --locked",
]

[tasks.configure]
env = { CC = "clang", CXX = "clang++" }
run = "pixi run cmake -S . -B build -G Ninja"

[tasks.build]
depends = ["//:configure"]
run = "pixi run cmake --build build --parallel"

[tasks.clean]
run = "rm -rf build"

[tasks.test]
depends = ["//:build"]
env = { XDG_DATA_DIRS = "{{config_root}}/.pixi/envs/default/share" }
run = "zig build test --summary all"

[tasks.check]
run = "hk check --all"

[tasks.fix]
run = "hk fix --all"

[tasks."docs:c"]
run = "doxygen docs/api/Doxyfile"

[tasks._verify-clean-worktree]
description = "Verify the worktree is clean after the task run"
hide = true
run = "git update-index -q --refresh && git diff --exit-code && git diff --cached --exit-code"
