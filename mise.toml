experimental_monorepo_root = true

[settings]
pin = true
experimental = true

[monorepo]
config_roots = ["examples/zig-map"]

[tools]
hk = "1.40.0"
pkl = "0.31.0"
dprint = "0.53.2"
"github:sargunv/jvl" = "2026.04.03"
pixi = "latest"
"github:blankspruce/gersemi" = "0.27.2"
zig = "0.16.0"

[hooks]
postinstall = [
  "hk install --mise",
  "pixi install --locked",
]

[tasks.configure]
env = { _.source = "config/pixi-env.sh", CC = "clang", CXX = "clang++" }
run = "cmake -S . -B build -G Ninja"

[tasks.build]
depends = ["configure"]
env = { _.source = "config/pixi-env.sh" }
run = "cmake --build build --parallel"

[tasks.clean]
run = "rm -rf build"

[tasks.test]
depends = ["build"]
env = { XDG_DATA_DIRS = "{{config_root}}/.pixi/envs/default/share" }
run = "zig build test --summary all"

[tasks.check]
run = "hk check --all"

[tasks.fix]
run = "hk fix --all"
