[settings]
pin = true
experimental = true

[tools]
cmake = "3.31.6"
zig = "0.16.0"
hk = "1.40.0"
pkl = "0.31.0"
dprint = "0.53.2"
"conda:clang-format" = "21.1.8"
"github:sargunv/jvl" = "2026.04.03"

[hooks]
postinstall = [
  "hk install --mise",
]

[tasks.build]
description = "Build core library"
run = [
  "cmake -S . -B build",
  "cmake --build build",
]

[tasks."build:hello"]
description = "Build hello-world Zig example"
depends = ["build"]
run = "zig build"

[tasks."run:hello"]
description = "Run hello-world Zig example"
depends = ["build:hello"]
run = "zig build run"

[tasks.check]
description = "Run all checks"
run = "hk check --all"

[tasks.fix]
description = "Fix all auto-fixable issues"
run = "hk fix --all"
