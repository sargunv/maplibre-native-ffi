name: Setup CI deps
description: Install sccache and mise toolchain (mise postinstall handles pixi install --locked)

runs:
  using: composite
  steps:
    - name: Install sccache
      uses: mozilla-actions/sccache-action@1583d6b38d7be47f593cb472781bbb21cab4321e # v0.0.10

    - name: Wire sccache into CMake
      shell: bash
      run: |
        {
          echo "SCCACHE_GHA_ENABLED=true"
          echo "CMAKE_C_COMPILER_LAUNCHER=sccache"
          echo "CMAKE_CXX_COMPILER_LAUNCHER=sccache"
        } >> "$GITHUB_ENV"

    - name: Install mise toolchain
      uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      with:
        cache: true
        install: true
