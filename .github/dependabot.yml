# yaml-language-server: $schema=https://json.schemastore.org/dependabot-2.0.json
#
# Not yet supported:
# - mise tool versions: https://github.com/dependabot/dependabot-core/issues/12320
# - pixi/conda dependencies
# - the MapLibre Native pin in cmake/mln_version.cmake (manual bumps)
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 3
    groups:
      github-actions:
        patterns: ["*"]
