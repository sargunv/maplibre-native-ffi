# yaml-language-server: $schema=https://json.schemastore.org/github-issue-forms.json
name: Bug report
description: Report a bug
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Platform
      description: Operating system and version you tested on.
    validations:
      required: false
  - type: input
    id: render-backend
    attributes:
      label: Render backend
      description: Render backend in use, such as Metal, Vulkan, or OpenGL/EGL.
    validations:
      required: false
  - type: input
    id: commit
    attributes:
      label: Commit
      description: Commit SHA or branch you tested against (e.g. `main` at abc1234)
    validations:
      required: false
