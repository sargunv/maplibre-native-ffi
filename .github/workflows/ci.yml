name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  MISE_ENV: ci

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  hygiene:
    name: hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-ci-deps

      - run: mise run ci:hygiene

  docs:
    name: docs
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-ci-deps

      - run: mise run ci:docs

      - name: Upload docs artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: docs-site
          path: docs/dist
          if-no-files-found: error
          retention-days: 14

  native:
    name: native / ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            runner: ubuntu-latest
          - target: linux-arm64
            runner: ubuntu-24.04-arm
          - target: macos-arm64
            runner: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-ci-deps

      - name: Cache MapLibre Native source
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: third_party/maplibre-native
          key: mln-src-v1-${{ hashFiles('cmake/mln_version.cmake') }}

      - run: mise run ci:native

      - run: mise run ci:native-artifact

      - name: Upload native artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: native-${{ matrix.target }}
          path: ci-artifact
          if-no-files-found: error
          retention-days: 14

  examples:
    name: examples / ${{ matrix.example }} / ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    needs: native
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        example: [zig-map, zig-readback, swift-map]
        target: [linux-x64, linux-arm64, macos-arm64]
        exclude:
          - example: swift-map
            target: linux-x64
          - example: swift-map
            target: linux-arm64
        include:
          - target: linux-x64
            runner: ubuntu-latest
          - target: linux-arm64
            runner: ubuntu-24.04-arm
          - target: macos-arm64
            runner: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-ci-deps

      - name: Download native artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: native-${{ matrix.target }}
          path: .

      - run: mise run ci:examples:${{ matrix.example }}

  required:
    name: ci-required
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: ${{ always() }}
    needs:
      - hygiene
      - docs
      - native
      - examples
    steps:
      - name: Fail if required jobs failed
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'skipped') }}
        run: |
          echo '${{ toJSON(needs) }}'
          exit 1

      - run: true
