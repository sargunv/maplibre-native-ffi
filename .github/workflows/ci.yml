name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: ${{ matrix.id }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: linux-x64
            runner: ubuntu-latest
          - id: linux-arm64
            runner: ubuntu-24.04-arm
          - id: macos-arm64
            runner: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-ci-deps

      - name: Cache MapLibre Native source
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: third_party/maplibre-native
          key: mln-src-v1-${{ hashFiles('cmake/mln_version.cmake') }}

      - run: mise run fix
      - run: mise run _verify-clean-worktree
      - run: mise run test
      - run: mise run //examples/zig-map:build

      - name: Upload diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: diagnostics-${{ matrix.id }}-${{ github.run_id }}
          path: |
            build/CMakeCache.txt
            build/compile_commands.json
            build/CMakeFiles/CMakeOutput.log
            build/CMakeFiles/CMakeError.log
          if-no-files-found: ignore
          retention-days: 14
