name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: ${{ matrix.id }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: linux-x64
            runner: ubuntu-latest
          - id: linux-arm64
            runner: ubuntu-24.04-arm
          - id: macos-arm64
            runner: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # actions/checkout fetches submodules sequentially. The MapLibre Native
      # submodule has ~60 nested submodules; doing them one-at-a-time costs ~2
      # minutes. Fetch in parallel instead.
      - name: Fetch submodules in parallel
        run: git submodule update --init --recursive --depth=1 --jobs=8

      - uses: ./.github/actions/setup-ci-deps

      - run: mise run fix
      - run: mise run _verify-clean-worktree
      - run: mise run test
      - run: mise run //examples/zig-map:build

      # mozilla-actions/sccache-action prints stats to the log on its own
      # post-step. We just need the file for the failure-artifact upload.
      - name: Capture sccache stats for failure artifact
        if: always()
        run: sccache --show-stats > sccache-stats.txt

      - name: Upload diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: diagnostics-${{ matrix.id }}-${{ github.run_id }}
          path: |
            build/CMakeCache.txt
            build/compile_commands.json
            build/CMakeFiles/CMakeOutput.log
            build/CMakeFiles/CMakeError.log
            sccache-stats.txt
          if-no-files-found: ignore
          retention-days: 14
